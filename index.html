<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>オンライン分光光度計 - Online Spectrophotometer</title>
    <!-- Chart.js & Zoom Plugin -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
    <!-- OpenCV.js (using jsdelivr to avoid docs.opencv.org CORS/COEP issues) -->
    <script src="https://cdn.jsdelivr.net/npm/@techstark/opencv-js@4.9.0-release.3/dist/opencv.js" async></script>
    <!-- heic2any for HEIC support -->
    <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="header-container">
            <h1>Spectrum Analyzer</h1>
            <div class="theme-toggle">
                <button id="theme-btn" aria-label="テーマ切り替え">🌙</button>
            </div>
        </div>
    </header>

    <main>
        <div class="controls-panel">
            <section class="mode-selection card">
                <h2>解析設定</h2>
                <div class="setting-group">
                    <label for="mode-select">解析モード:</label>
                    <select id="mode-select">
                        <option value="single">モード1: 単一スペクトル解析（強度）</option>
                        <option value="same-image">モード2: 同一画像内 Ref/Sam 解析（吸光度）</option>
                        <option value="diff-image">モード3: 別画像間 Ref/Sam 解析（吸光度）</option>
                    </select>
                </div>
                <div class="setting-group">
                    <label for="direction-select">波長の方向 (スリット方向):</label>
                    <select id="direction-select">
                        <option value="horizontal">水平（左 ←→ 右）</option>
                        <option value="vertical">垂直（上 ←→ 下）</option>
                    </select>
                </div>
                <div class="setting-group">
                    <label for="shape-select">範囲設定モード:</label>
                    <select id="shape-select">
                        <option value="rect">パターン1: 矩形＋回転（斜め対応・対称中心拡大）</option>
                        <option value="free">パターン2: 自由変形 (4隅を独立して移動)</option>
                    </select>
                </div>
            </section>

            <section class="upload-section card">
                <h2>画像アップロード</h2>
                <div id="drop-zone-primary" class="drop-zone">
                    <p id="primary-prompt">ここに画像をドラッグ＆ドロップ、またはクリックして選択</p>
                    <input type="file" id="file-input-primary" accept="image/jpeg, image/png, .heic, .heif" hidden>
                </div>
                <div id="drop-zone-secondary" class="drop-zone hidden">
                    <p>Sample画像をドラッグ＆ドロップ、またはクリックして選択</p>
                    <input type="file" id="file-input-secondary" accept="image/jpeg, image/png, .heic, .heif" hidden>
                </div>
            </section>

            <section class="calibration-section card">
                <h2>キャリブレーション (Pixel → nm)</h2>
                <div class="calib-inputs">
                    <div class="calib-point">
                        <label>点1 (Pixel): <input type="number" id="calib-p1" step="0.1" readonly></label>
                        <label>波長 (nm): <input type="number" id="calib-w1" value="435.8"></label>
                        <button class="pick-btn" data-target="1">画像から取得</button>
                    </div>
                    <div class="calib-point">
                        <label>点2 (Pixel): <input type="number" id="calib-p2" step="0.1" readonly></label>
                        <label>波長 (nm): <input type="number" id="calib-w2" value="546.1"></label>
                        <button class="pick-btn" data-target="2">画像から取得</button>
                    </div>
                </div>
                <button id="apply-calib-btn" class="primary-btn">校正適用 / 更新</button>
                <button id="reset-calib-btn" class="secondary-btn">校正リセット</button>
            </section>
        </div>

        <div class="preview-panel">
            <section class="canvas-section card">
                <h2>画像プレビュー & 範囲選択</h2>
                <p class="hint">ポイントをドラッグして解析範囲（矩形・斜め）を指定してください</p>
                <div class="canvas-container" id="canvas-wrapper-primary">
                    <canvas id="preview-canvas-primary"></canvas>
                </div>
                <div class="canvas-container hidden" id="canvas-wrapper-secondary">
                    <canvas id="preview-canvas-secondary"></canvas>
                </div>
                <button id="extract-btn" class="primary-btn" disabled>スペクトル抽出</button>
            </section>
        </div>

        <div class="result-panel">
            <section class="chart-section card">
                <h2>解析結果</h2>
                <div class="chart-container">
                    <canvas id="spectrum-chart"></canvas>
                </div>
                <div class="graph-controls">
                    <button id="reset-zoom-btn" class="secondary-btn">元のサイズに戻す</button>
                    <button id="zoom-in-btn" class="secondary-btn" aria-label="Zoom In">拡大 (＋)</button>
                    <button id="zoom-out-btn" class="secondary-btn" aria-label="Zoom Out">縮小 (－)</button>
                </div>
                <div class="export-actions">
                    <button id="export-csv-btn" class="primary-btn" disabled>CSVダウンロード</button>
                </div>
            </section>
        </div>
    </main>

    <!-- Overlay loading -->
    <div id="loading-overlay" class="overlay">
        <div class="spinner"></div>
        <p>OpenCV.js 読み込み中...</p>
    </div>

    <script src="script.js"></script>
</body>

</html>
